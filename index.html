<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>InkBridge</title>
    <style>
      /* Full-bleed, DPR-native surface (research 08_mobile_quality §1).
         The Phaser canvas fills 100% of the body — there is NO CSS-side
         centering or safe-area padding (that double-centered on top of Phaser's
         autoCenter and self-inflicted a letterbox + stale pointer bounds on
         WKWebView). Safe-area insets are read from the hidden probe below and
         fed into the in-game LAYOUT instead. Background is sky (not dark) so
         there is no dark flash before the first scene paints. */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #a8e4ff;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #app {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        width: 100dvw;
        height: 100dvh;
        overflow: hidden;
      }
      #app canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }
      /* Safe-area probe (research §1.3): env() cannot be read from JS, so we
         paint the insets onto this hidden element's padding and read the
         resolved computed values from src/render/ui/layout.ts. */
      #safe-probe {
        position: fixed;
        top: 0;
        left: 0;
        width: 0;
        height: 0;
        visibility: hidden;
        pointer-events: none;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="safe-probe"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
